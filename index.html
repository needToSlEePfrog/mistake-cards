<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>错题本</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f7f3ec;
  --paper2:#f0ebe0;
  --paper3:#e8e1d4;
  --ink:#1c1a16;
  --ink2:#6b6456;
  --ink3:#a89e8e;
  --rule:#d8d0c0;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);
}

/* Subject palette */
.s-em   { --sc:#c0392b; --sl2:#f9eeec; --sb2:#e8c5c0; }
.s-sig  { --sc:#2471a3; --sl2:#eaf3fb; --sb2:#b8d4ea; }
.s-cpx  { --sc:#1e8449; --sl2:#eafaf1; --sb2:#b8e4c8; }
.s-emb  { --sc:#7d3c98; --sl2:#f5eafb; --sb2:#d8b8e8; }
.s-it   { --sc:#b7770d; --sl2:#fdf6e3; --sb2:#f0d9a0; }
.s-def  { --sc:#6b6456; --sl2:#f0ebe0; --sb2:#c8c0b0; }

html,body{
  height:100%;
  background:var(--paper);
  color:var(--ink);
  font-family:'Noto Serif SC','Songti SC','STSong','SimSun',Georgia,serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}

#app{
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  max-width:480px;
  margin:0 auto;
  /* Paper texture via repeating lines */
  background-image:repeating-linear-gradient(
    transparent,
    transparent 27px,
    var(--rule) 27px,
    var(--rule) 28px
  );
  background-attachment:local;
}

.view{display:none;flex-direction:column;flex:1;overflow:hidden}
.view.active{display:flex}

/* ── Top bar ── */
.tb{
  padding:calc(var(--st) + 12px) 18px 12px;
  background:var(--paper);
  flex-shrink:0;
  border-bottom:2px solid var(--ink);
  display:flex;align-items:center;gap:10px;
}
.tb-title{
  flex:1;
  font-size:18px;font-weight:900;
  letter-spacing:.04em;
  color:var(--ink);
}
.tb-subtitle{
  font-size:12px;color:var(--ink2);
  font-family:'Noto Sans SC',sans-serif;
  margin-top:1px;
}
.tb-back{
  background:none;border:none;
  font-size:26px;color:var(--ink2);
  cursor:pointer;padding:0 4px 0 0;
  line-height:1;
}

/* ── Scroll ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-pad{padding-bottom:calc(var(--sb) + 32px)}

/* ── Dashboard ── */
.dash-header{
  padding:24px 18px 16px;
  border-bottom:1px solid var(--rule);
}
.dash-book-label{
  font-size:10px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
  margin-bottom:8px;
}
.dash-book-title{
  font-size:30px;font-weight:900;
  color:var(--ink);
  letter-spacing:-.01em;
  line-height:1.1;
}
.dash-book-title span{
  display:block;
  font-size:13px;font-weight:400;
  color:var(--ink2);
  font-family:'Noto Sans SC',sans-serif;
  margin-top:6px;
  letter-spacing:.02em;
}
.dash-stats{
  display:flex;
  gap:0;
  margin-top:18px;
  border:1px solid var(--rule);
  border-radius:4px;
  overflow:hidden;
  background:var(--paper2);
}
.dash-stat{
  flex:1;text-align:center;
  padding:12px 6px;
  position:relative;
  border-right:1px solid var(--rule);
}
.dash-stat:last-child{border-right:none}
.dash-stat-n{
  font-size:24px;font-weight:900;
  color:var(--ink);line-height:1;
}
.dash-stat-l{
  font-size:10px;color:var(--ink3);
  margin-top:4px;
  font-family:'Noto Sans SC',sans-serif;
}

/* ── Section label ── */
.sec{
  padding:16px 18px 8px;
  font-size:10px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
  display:flex;align-items:center;gap:8px;
}
.sec::after{
  content:'';flex:1;height:1px;background:var(--rule);
}

/* ── Subject cards ── */
.subj-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:0 18px;
}
.subj-card{
  background:var(--paper2);
  border:1px solid var(--rule);
  border-radius:4px;
  padding:14px 14px 12px;
  cursor:pointer;
  transition:transform .12s;
  position:relative;
  overflow:hidden;
}
.subj-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--sc);
}
.subj-card:active{transform:scale(.97)}
.subj-card-name{
  font-size:13px;font-weight:700;
  color:var(--ink);line-height:1.3;
  margin-top:4px;
}
.subj-card-count{
  font-size:28px;font-weight:900;
  color:var(--sc);
  margin-top:6px;line-height:1;
}
.subj-card-lbl{
  font-size:10px;color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
}

/* ── Card list item ── */
.ci{
  margin:0 18px 8px;
  background:var(--paper);
  border:1px solid var(--rule);
  border-left:3px solid var(--sc);
  padding:12px 14px;
  cursor:pointer;
  transition:transform .1s;
  border-radius:0 4px 4px 0;
}
.ci:active{transform:scale(.985)}
.ci-title{
  font-size:14px;font-weight:700;
  color:var(--ink);margin-bottom:5px;
}
.ci-question{
  font-size:12px;color:var(--ink2);
  line-height:1.6;
  font-family:'Noto Sans SC',sans-serif;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.ci-meta{
  display:flex;align-items:center;gap:6px;
  margin-top:8px;flex-wrap:wrap;
}
.ci-tag{
  font-size:10px;padding:2px 7px;
  border:1px solid var(--rule);
  color:var(--ink2);
  font-family:'Noto Sans SC',sans-serif;
  border-radius:2px;
}
.ci-date{font-size:10px;color:var(--ink3);margin-left:auto;font-family:'Noto Sans SC',sans-serif;}

/* ── Search ── */
.search-row{
  padding:10px 18px;
  flex-shrink:0;
  border-bottom:1px solid var(--rule);
}
.search-inp{
  width:100%;
  background:var(--paper2);
  border:1px solid var(--rule);
  padding:8px 12px;
  font-size:13px;color:var(--ink);
  font-family:'Noto Sans SC',sans-serif;
  outline:none;border-radius:2px;
  transition:border-color .15s;
}
.search-inp:focus{border-color:var(--ink2)}
.search-inp::placeholder{color:var(--ink3)}

/* ── Card detail ── */
#v-card{background:var(--paper)}

.card-scroll{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:0 0 calc(var(--sb)+32px);
}

/* Card header strip */
.card-header{
  background:var(--sl2,#f0ebe0);
  border-bottom:2px solid var(--sc,#6b6456);
  padding:16px 18px 14px;
}
.card-header-top{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.card-subject-chip{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;
  background:var(--sc);color:#fff;
  padding:3px 8px;border-radius:2px;
  font-family:'Noto Sans SC',sans-serif;
}
.card-type-chip{
  font-size:10px;color:var(--sc);
  font-family:'Noto Sans SC',sans-serif;
  border:1px solid var(--sb2,#c8c0b0);
  padding:2px 7px;border-radius:2px;
}
.card-date{font-size:10px;color:var(--ink3);margin-left:auto;font-family:'Noto Sans SC',sans-serif;}

.card-title{
  font-size:17px;font-weight:900;
  color:var(--ink);line-height:1.4;
  margin-bottom:10px;
}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.card-tag{
  font-size:10px;color:var(--ink2);
  border:1px solid var(--sb2,#c8c0b0);
  padding:2px 7px;border-radius:2px;
  font-family:'Noto Sans SC',sans-serif;
}

/* Question block */
.card-question-block{
  margin:16px 18px 0;
  padding:14px 16px;
  background:var(--paper2);
  border:1px solid var(--rule);
  border-left:4px solid var(--sc,#6b6456);
  border-radius:0 4px 4px 0;
}
.card-question-label{
  font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
  margin-bottom:8px;
}
.card-question-text{
  font-size:14px;line-height:1.8;color:var(--ink);
}

/* Image */
.card-image-block{
  margin:12px 18px 0;
  border:1px solid var(--rule);
  border-radius:4px;overflow:hidden;
}
.card-image-block img{width:100%;display:block}

/* Divider */
.card-divider{
  display:flex;align-items:center;gap:10px;
  margin:18px 18px 0;
}
.card-divider-label{
  font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
  white-space:nowrap;
}
.card-divider-line{flex:1;height:1px;background:var(--rule)}

/* Steps */
.card-steps{padding:12px 18px 0}
.step{margin-bottom:10px}

.step-key-row{display:flex;gap:10px;align-items:flex-start}
.step-key-bullet{
  width:18px;height:18px;border-radius:50%;
  background:var(--sc,#6b6456);
  color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
  font-family:'Noto Sans SC',sans-serif;
}
.step-key-text{
  font-size:14px;font-weight:700;
  color:var(--ink);line-height:1.7;flex:1;
}

.step-detail-btn{
  display:flex;align-items:center;gap:6px;
  margin:4px 0 0 28px;
  padding:5px 10px;
  background:var(--paper2);
  border:1px solid var(--rule);
  border-radius:2px;
  font-size:11px;color:var(--ink2);
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;
  width:fit-content;
}
.step-detail-body{
  margin:6px 0 0 28px;
  padding:10px 12px;
  background:var(--paper2);
  border:1px solid var(--rule);
  border-radius:2px;
  font-size:13px;line-height:1.8;
  color:var(--ink);
  display:none;
}
.step-detail-body.open{display:block}

.step-lone{
  display:flex;gap:10px;align-items:flex-start;
  margin-bottom:6px;
}
.step-lone-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--rule);
  flex-shrink:0;margin-top:8px;
}
.step-lone-text{
  font-size:13px;color:var(--ink2);line-height:1.7;flex:1;
  font-family:'Noto Sans SC',sans-serif;
}

/* Conclusion */
.card-conclusion{
  margin:16px 18px 0;
  padding:14px 16px;
  background:var(--sl2,#f0ebe0);
  border:1px solid var(--sb2,#c8c0b0);
  border-radius:4px;
  position:relative;
}
.card-conclusion::before{
  content:'"';
  position:absolute;top:-4px;left:12px;
  font-size:40px;color:var(--sc);
  opacity:.25;line-height:1;
  font-family:Georgia,serif;
}
.card-conclusion-label{
  font-size:9px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--sc);
  font-family:'Noto Sans SC',sans-serif;margin-bottom:6px;
}
.card-conclusion-text{
  font-size:13px;line-height:1.8;
  color:var(--ink);font-style:italic;
}

/* ── Loading / Empty ── */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;color:var(--ink3);
  gap:12px;font-family:'Noto Sans SC',sans-serif;font-size:13px;
}
.loading-spinner{
  width:24px;height:24px;border:2px solid var(--rule);
  border-top-color:var(--ink2);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.5}
.empty-title{font-size:14px;font-weight:700;color:var(--ink2);margin-bottom:4px}
.empty-sub{font-size:12px;line-height:1.6;font-family:'Noto Sans SC',sans-serif}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(var(--sb)+16px);
  left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:var(--paper);
  padding:8px 18px;border-radius:2px;
  font-size:12px;font-family:'Noto Sans SC',sans-serif;
  opacity:0;transition:all .2s;pointer-events:none;
  white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── KaTeX ── */
.katex{font-size:.95em}
.katex-display{margin:.6em 0;overflow-x:auto}
</style>
</head>
<body>
<div id="app">

<!-- ══ DASHBOARD ══════════════════════════════════════════════ -->
<div class="view active" id="v-dash">
  <div class="tb">
    <div>
      <div class="tb-title">错题本</div>
      <div class="tb-subtitle" id="dash-subtitle">加载中…</div>
    </div>
  </div>
  <div class="scroll scroll-pad" id="dash-scroll">
    <div class="dash-header">
      <div class="dash-book-label">Study Notebook</div>
      <div class="dash-book-title">
        我的错题本
        <span id="dash-desc">正在同步题目…</span>
      </div>
      <div class="dash-stats">
        <div class="dash-stat">
          <div class="dash-stat-n" id="stat-total">—</div>
          <div class="dash-stat-l">道题目</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-n" id="stat-subj">—</div>
          <div class="dash-stat-l">个科目</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-n" id="stat-week">—</div>
          <div class="dash-stat-l">本周新增</div>
        </div>
      </div>
    </div>
    <div class="sec">科目</div>
    <div class="subj-grid" id="subj-grid"></div>
    <div class="sec" id="recent-sec" style="display:none">最近添加</div>
    <div id="recent-list"></div>
  </div>
</div>

<!-- ══ SUBJECT ════════════════════════════════════════════════ -->
<div class="view" id="v-subj">
  <div class="tb">
    <button class="tb-back" onclick="back()">‹</button>
    <div>
      <div class="tb-title" id="subj-title"></div>
      <div class="tb-subtitle" id="subj-count"></div>
    </div>
  </div>
  <div class="search-row">
    <input class="search-inp" placeholder="搜索题目标题或关键词…" id="search-inp" oninput="filterCards()">
  </div>
  <div class="scroll scroll-pad" style="padding-top:10px">
    <div id="subj-list"></div>
  </div>
</div>

<!-- ══ CARD DETAIL ════════════════════════════════════════════ -->
<div class="view" id="v-card">
  <div class="tb">
    <button class="tb-back" onclick="back()">‹</button>
    <div class="tb-title" id="cd-title" style="font-size:14px"></div>
  </div>
  <div class="card-scroll" id="card-scroll"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ━━━ Subject config ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SUBJECTS = [
  { name:'电磁波与电磁场', file:'em.json',          cls:'s-em',  code:'em'  },
  { name:'信号与系统',     file:'signals.json',     cls:'s-sig', code:'sig' },
  { name:'复变函数',       file:'complex.json',     cls:'s-cpx', code:'cpx' },
  { name:'嵌入式系统',     file:'embedded.json',    cls:'s-emb', code:'emb' },
  { name:'信息论',         file:'info_theory.json', cls:'s-it',  code:'it'  },
];
function subjCls(name){
  return SUBJECTS.find(s=>s.name===name)?.cls || 's-def';
}
function typeLabel(t){
  return {mistake:'错题',example:'例题',good:'好题'}[t]||t||'题目';
}

// ━━━ Data — network-first, no IndexedDB ━━━━━━━━━━━━━━━━━━━━
let ALL_CARDS = [];   // flat array of all cards
let LAST_FETCH = 0;

async function fetchSubject(file){
  const res = await fetch('/data/'+file+'?t='+Date.now(),{cache:'no-store'});
  if(!res.ok) return [];
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function loadAll(forceRefresh=false){
  if(!forceRefresh && ALL_CARDS.length && Date.now()-LAST_FETCH < 60000) return ALL_CARDS;
  const results = await Promise.allSettled(SUBJECTS.map(s=>fetchSubject(s.file)));
  ALL_CARDS = results.flatMap(r=>r.status==='fulfilled'?r.value:[]);
  LAST_FETCH = Date.now();
  return ALL_CARDS;
}

function cardsForSubject(name){ return ALL_CARDS.filter(c=>c.subject===name) }

// ━━━ Navigation ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const stack = ['v-dash'];
function nav(id){
  document.querySelector('.view.active')?.classList.remove('active');
  document.getElementById(id).classList.add('active');
  stack.push(id);
}
function back(){
  if(stack.length<=1) return;
  document.querySelector('.view.active')?.classList.remove('active');
  stack.pop();
  document.getElementById(stack[stack.length-1]).classList.add('active');
}

// ━━━ Dashboard ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function renderDash(){
  const cards = await loadAll(true);
  const subjSet = [...new Set(cards.map(c=>c.subject))];
  const weekAgo = Date.now()-7*86400000;
  const weekNew = cards.filter(c=>new Date(c.created).getTime()>weekAgo).length;

  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-subj').textContent  = subjSet.length;
  document.getElementById('stat-week').textContent  = weekNew;
  document.getElementById('dash-desc').textContent  =
    cards.length ? `共 ${subjSet.length} 个科目，${cards.length} 道题目` : '暂无题目';
  document.getElementById('dash-subtitle').textContent =
    cards.length ? '点击科目查看题目' : '等待题目同步…';

  // Subject grid
  const grid = document.getElementById('subj-grid');
  grid.innerHTML = '';
  SUBJECTS.forEach(s=>{
    const count = cards.filter(c=>c.subject===s.name).length;
    const el = document.createElement('div');
    el.className = `subj-card ${s.cls}`;
    el.innerHTML = `
      <div class="subj-card-name">${s.name}</div>
      <div class="subj-card-count">${count}</div>
      <div class="subj-card-lbl">道题目</div>`;
    el.onclick = ()=>openSubj(s.name, s.cls);
    grid.appendChild(el);
  });

  // Recent 5
  const recentSec = document.getElementById('recent-sec');
  const recentList = document.getElementById('recent-list');
  const sorted = [...cards].sort((a,b)=>
    (b.created||'').localeCompare(a.created||'')).slice(0,5);
  if(sorted.length){
    recentSec.style.display='';
    recentList.innerHTML='';
    sorted.forEach(c=>{
      recentList.appendChild(mkCI(c, subjCls(c.subject)));
    });
    doMath(recentList);
  } else {
    recentSec.style.display='none';
  }
}

// ━━━ Subject view ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let curSubjName='', curSubjCls='';
function openSubj(name, cls){
  curSubjName=name; curSubjCls=cls;
  document.getElementById('subj-title').textContent=name;
  document.getElementById('search-inp').value='';
  renderSubj();
  nav('v-subj');
}
function renderSubj(){
  const cards = cardsForSubject(curSubjName)
    .sort((a,b)=>(b.created||'').localeCompare(a.created||''));
  document.getElementById('subj-count').textContent=`${cards.length} 道题目`;
  const list=document.getElementById('subj-list');
  list.innerHTML='';
  if(!cards.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">暂无题目</div><div class="empty-sub">该科目还没有题目</div></div>';
    return;
  }
  cards.forEach(c=>list.appendChild(mkCI(c,curSubjCls)));
  doMath(list);
}
function filterCards(){
  const q=document.getElementById('search-inp').value.trim().toLowerCase();
  document.querySelectorAll('#subj-list .ci').forEach(el=>{
    el.style.display=(!q||el.dataset.search.includes(q))?'':'none';
  });
}

// ━━━ Card list item ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function mkCI(card, cls){
  const el=document.createElement('div');
  el.className=`ci ${cls}`;
  el.dataset.search=[card.title,card.question,...(card.tags||[])].join(' ').toLowerCase();
  const tags=(card.tags||[]).slice(0,3).map(t=>`<span class="ci-tag">${t}</span>`).join('');
  el.innerHTML=`
    <div class="ci-title">${card.title||'无标题'}</div>
    <div class="ci-question">${stripMath(card.question||'')}</div>
    <div class="ci-meta">${tags}<span class="ci-date">${card.created||''}</span></div>`;
  el.onclick=()=>openCard(card,cls);
  return el;
}
function stripMath(s){return s.replace(/\$\$[\s\S]*?\$\$/g,'[式]').replace(/\$[^$]*?\$/g,'[式]')}

// ━━━ Card detail ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openCard(card, cls){
  document.getElementById('cd-title').textContent=card.title||'题目详情';
  const scroll=document.getElementById('card-scroll');
  scroll.scrollTop=0;

  const tags=(card.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('');

  // Steps
  let stepsHtml='';
  const steps=card.steps||[];
  let keyIdx=0, i=0;
  while(i<steps.length){
    const s=steps[i];
    if(s.key){
      keyIdx++;
      let details=[], j=i+1;
      while(j<steps.length&&!steps[j].key){details.push(steps[j]);j++;}
      const uid=`step-${Math.random().toString(36).slice(2)}`;
      const detailHtml=details.length?`
        <button class="step-detail-btn" onclick="toggleDetail('${uid}')">
          <span id="${uid}-arr">▸</span> 查看推导细节
        </button>
        <div class="step-detail-body" id="${uid}">
          ${details.map(d=>`<div style="margin-bottom:6px">${d.content}</div>`).join('')}
        </div>`:'';
      stepsHtml+=`
        <div class="step">
          <div class="step-key-row">
            <div class="step-key-bullet">${keyIdx}</div>
            <div class="step-key-text">${s.content}</div>
          </div>
          ${detailHtml}
        </div>`;
      i=j;
    } else {
      stepsHtml+=`
        <div class="step-lone">
          <div class="step-lone-dot"></div>
          <div class="step-lone-text">${s.content}</div>
        </div>`;
      i++;
    }
  }

  const imgHtml=card.image?`
    <div class="card-image-block">
      <img src="/data/images/${card.image}" alt="题目图片" loading="lazy">
    </div>`:''

  const concHtml=card.conclusion?`
    <div class="card-divider">
      <div class="card-divider-label">关键结论</div>
      <div class="card-divider-line"></div>
    </div>
    <div class="card-conclusion ${cls}">
      <div class="card-conclusion-label">Key Takeaway</div>
      <div class="card-conclusion-text">${card.conclusion}</div>
    </div>`:'';

  scroll.innerHTML=`
    <div class="${cls}">
      <div class="card-header">
        <div class="card-header-top">
          <span class="card-subject-chip">${card.subject}</span>
          <span class="card-type-chip">${typeLabel(card.type)}</span>
          <span class="card-date">${card.created||''}</span>
        </div>
        <div class="card-title">${card.title||''}</div>
        ${tags?`<div class="card-tags">${tags}</div>`:''}
      </div>
      <div class="card-question-block">
        <div class="card-question-label">题目</div>
        <div class="card-question-text">${card.question||''}</div>
      </div>
      ${imgHtml}
      <div class="card-divider" style="margin-top:18px">
        <div class="card-divider-label">解题思路</div>
        <div class="card-divider-line"></div>
      </div>
      <div class="card-steps">${stepsHtml}</div>
      ${concHtml}
    </div>`;

  nav('v-card');
  doMath(scroll);
}

function toggleDetail(uid){
  const body=document.getElementById(uid);
  const arr=document.getElementById(uid+'-arr');
  const open=body.classList.toggle('open');
  arr.textContent=open?'▾':'▸';
  if(open) doMath(body);
}

// ━━━ KaTeX ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function doMath(el){
  function attempt(){
    if(window.renderMathInElement){
      renderMathInElement(el,{
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'$',right:'$',display:false},
          {left:'\\(',right:'\\)',display:false},
          {left:'\\[',right:'\\]',display:true},
        ],
        throwOnError:false,
      });
    } else { setTimeout(attempt,80); }
  }
  attempt();
}

// ━━━ Toast ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ━━━ Init ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function init(){
  await renderDash();
  if('serviceWorker' in navigator)
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
document.addEventListener('DOMContentLoaded',init);
</script>
