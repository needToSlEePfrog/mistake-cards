<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>题目本</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  crossorigin="anonymous" onload="window._katexReady=true"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;
  --surf:#13131f;
  --surf2:#1a1a2a;
  --bdr:rgba(255,255,255,0.07);
  --txt:#f0f0f8;
  --txt2:#8080a8;
  --txt3:#3a3a55;
  --accent:#c8a96e;
  --accent2:#8b9fe8;
  --card-bg:#f7f6f2;
  --card-txt:#1a1a28;
  --card-txt2:#5a5a78;
  --card-bdr:#e0dfd8;
  --r:16px; --rs:10px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;background:var(--bg);color:var(--txt);
  font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── Layout ── */
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.view{display:none;flex-direction:column;flex:1;overflow:hidden}
.view.active{display:flex}

/* ── Topbar ── */
.tb{
  padding:calc(var(--st) + 14px) 16px 14px;
  display:flex;align-items:center;gap:10px;
  background:var(--bg);
  flex-shrink:0;
  position:relative;
}
.tb::after{
  content:'';position:absolute;bottom:0;left:16px;right:16px;
  height:1px;background:var(--bdr);
}
.tb-title{font-size:17px;font-weight:700;flex:1;letter-spacing:.02em}
.tb-btn{
  width:36px;height:36px;border:none;background:var(--surf2);
  color:var(--txt);border-radius:10px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s;flex-shrink:0;border:1px solid var(--bdr);
}
.tb-btn:active{background:var(--surf)}
.tb-back{font-size:24px;background:transparent;border:none;color:var(--txt2)}

/* ── Scroll ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.scroll-pb{padding-bottom:calc(var(--sb) + 24px)}

/* ── Dashboard ── */
.dash-hero{
  padding:24px 0 20px;
  margin-bottom:8px;
}
.dash-hero-label{
  font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;
}
.dash-hero-title{
  font-size:28px;font-weight:800;color:var(--txt);
  line-height:1.2;margin-bottom:6px;
}
.dash-hero-sub{font-size:13px;color:var(--txt2)}
.dash-stats{
  display:flex;gap:0;margin-top:20px;
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);
  overflow:hidden;
}
.dash-stat{
  flex:1;text-align:center;padding:14px 8px;
  position:relative;
}
.dash-stat+.dash-stat::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:1px;background:var(--bdr);
}
.dash-stat-n{font-size:22px;font-weight:800;color:var(--accent)}
.dash-stat-l{font-size:11px;color:var(--txt2);margin-top:3px}

.sec-label{
  font-size:11px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.12em;
  margin:20px 0 10px;
}

/* ── Subject Grid ── */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subj-card{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--r);padding:16px;cursor:pointer;
  transition:transform .15s,border-color .15s;
  position:relative;overflow:hidden;min-height:90px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.subj-card:active{transform:scale(.97)}
.subj-card-accent{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--c,var(--accent));
}
.subj-card-name{font-size:13px;font-weight:700;line-height:1.3;color:var(--txt)}
.subj-card-count{
  font-size:24px;font-weight:800;margin-top:8px;
  color:var(--c,var(--accent));
}
.subj-card-lbl{font-size:10px;color:var(--txt2)}

/* ── Card List Item ── */
.ci{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--r);padding:14px 16px;margin-bottom:8px;
  cursor:pointer;transition:transform .12s;
  position:relative;overflow:hidden;
}
.ci:active{transform:scale(.985)}
.ci-accent{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--c,var(--accent));border-radius:3px 0 0 3px;
}
.ci-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:6px;padding-left:12px}
.ci-question{
  font-size:12px;color:var(--txt2);line-height:1.5;
  padding-left:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.ci-meta{
  display:flex;align-items:center;gap:6px;margin-top:8px;padding-left:12px;
  flex-wrap:wrap;
}
.ci-tag{
  font-size:10px;padding:2px 8px;border-radius:20px;
  background:var(--surf2);color:var(--txt2);border:1px solid var(--bdr);
}
.ci-date{font-size:10px;color:var(--txt3)}

/* ── Search ── */
.search-wrap{padding:12px 16px 0;flex-shrink:0}
.search-inp{
  width:100%;background:var(--surf2);border:1px solid var(--bdr);
  border-radius:10px;padding:9px 14px;color:var(--txt);font-size:14px;
  outline:none;transition:border-color .15s;
}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--txt3)}

/* ── Card Detail (WHITE CARD) ── */
#v-card{background:var(--bg)}
.card-wrap{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px calc(var(--sb) + 24px);
}
.white-card{
  background:var(--card-bg);border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.card-subject-bar{
  padding:14px 20px 0;
  display:flex;align-items:center;gap:8px;
}
.card-subject-chip{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  padding:4px 10px;border-radius:20px;
  background:var(--cc-bg,#f0ede6);color:var(--cc,#8b7355);
}
.card-date{font-size:11px;color:var(--card-txt2);margin-left:auto}
.card-tags{
  padding:8px 20px 0;display:flex;gap:6px;flex-wrap:wrap;
}
.card-tag{
  font-size:10px;padding:3px 8px;border-radius:20px;
  background:#eeecea;color:var(--card-txt2);
}
.card-question{
  padding:16px 20px 20px;
  font-size:16px;font-weight:700;line-height:1.6;
  color:var(--card-txt);
  border-bottom:1px solid var(--card-bdr);
}
.card-image{
  width:calc(100% - 40px);margin:0 20px 16px;
  border-radius:10px;border:1px solid var(--card-bdr);
  overflow:hidden;
}
.card-image img{width:100%;display:block}

/* steps */
.card-steps{padding:20px}
.step{margin-bottom:16px}
.step:last-child{margin-bottom:0}
.step-key{
  display:flex;gap:12px;align-items:flex-start;
}
.step-key-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--cc,#8b7355);margin-top:7px;flex-shrink:0;
}
.step-key-content{
  font-size:14px;line-height:1.7;color:var(--card-txt);font-weight:600;flex:1;
}
.step-detail-toggle{
  display:flex;align-items:center;gap:6px;
  margin-top:6px;padding:6px 10px;
  background:#eeecea;border-radius:8px;
  font-size:12px;color:var(--card-txt2);cursor:pointer;
  border:none;width:100%;text-align:left;
  transition:background .12s;
}
.step-detail-toggle:active{background:#e5e3df}
.step-detail-content{
  margin-top:8px;padding:10px 12px;
  background:#f2f0ec;border-radius:8px;
  font-size:13px;line-height:1.7;color:var(--card-txt);
  display:none;
}
.step-detail-content.open{display:block}

.card-conclusion{
  margin:0 20px 20px;padding:14px 16px;
  background:#f0ede6;border-radius:12px;
  border-left:3px solid var(--cc,#c8a96e);
  font-size:13px;line-height:1.6;color:var(--card-txt);
}
.card-conclusion-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--cc,#8b7355);margin-bottom:6px;
}

/* ── Empty ── */
.empty{text-align:center;padding:56px 20px;color:var(--txt2)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--txt2);line-height:1.6}

/* ── Sync indicator ── */
.sync-bar{
  display:none;align-items:center;gap:8px;
  padding:8px 16px;background:var(--surf);
  font-size:12px;color:var(--txt2);flex-shrink:0;
  border-bottom:1px solid var(--bdr);
}
.sync-bar.show{display:flex}
.sync-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);animation:pulse 1s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(var(--sb) + 20px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surf);border:1px solid var(--bdr);
  color:var(--txt);padding:10px 20px;border-radius:100px;
  font-size:13px;opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── KaTeX overrides for white card ── */
.white-card .katex{font-size:1em}
.white-card .katex-display{margin:.5em 0;overflow-x:auto}
</style>
</head>
<body>
<div id="app">

<!-- ══ DASH ══════════════════════════════════════════════════════ -->
<div class="view active" id="v-dash">
  <div class="sync-bar" id="sync-bar">
    <div class="sync-dot"></div>
    <span id="sync-msg">同步中…</span>
  </div>
  <div class="scroll scroll-pb">
    <div class="dash-hero">
      <div class="dash-hero-label">My Notebook</div>
      <div class="dash-hero-title">题目本</div>
      <div class="dash-hero-sub" id="hero-sub">加载中…</div>
      <div class="dash-stats">
        <div class="dash-stat">
          <div class="dash-stat-n" id="stat-total">0</div>
          <div class="dash-stat-l">道题目</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-n" id="stat-subj">0</div>
          <div class="dash-stat-l">个科目</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-n" id="stat-week">0</div>
          <div class="dash-stat-l">本周新增</div>
        </div>
      </div>
    </div>
    <div class="sec-label">科目</div>
    <div class="subj-grid" id="subj-grid"></div>
    <div class="sec-label" id="recent-label">最近添加</div>
    <div id="recent-list"></div>
  </div>
</div>

<!-- ══ SUBJECT ════════════════════════════════════════════════════ -->
<div class="view" id="v-subj">
  <div class="tb">
    <button class="tb-btn tb-back" onclick="back()">‹</button>
    <div class="tb-title" id="subj-title"></div>
  </div>
  <div class="search-wrap">
    <input class="search-inp" placeholder="搜索题目…" id="search-inp" oninput="filterCards()">
  </div>
  <div class="scroll scroll-pb" style="padding-top:12px">
    <div id="subj-list"></div>
  </div>
</div>

<!-- ══ CARD DETAIL ════════════════════════════════════════════════ -->
<div class="view" id="v-card">
  <div class="tb">
    <button class="tb-btn tb-back" onclick="back()">‹</button>
    <div class="tb-title" id="cd-subj-label" style="font-size:14px;color:var(--txt2)"></div>
  </div>
  <div class="card-wrap" id="card-wrap"></div>
</div>

</div><!-- #app -->

<div class="toast" id="toast"></div>

<script>
// ━━━ Subject colors ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SUBJ_COLORS = {
  '信号与系统':  {c:'#7a9fe8', bg:'#eef2fc', chip:'#c8d8f8', chipTxt:'#3a5aaa'},
  '复变函数':    {c:'#e88a9a', bg:'#fceef0', chip:'#f8d0d8', chipTxt:'#aa3a5a'},
  '电磁波与电磁场':{c:'#8bc87a', bg:'#eef8ec', chip:'#cceec8', chipTxt:'#3a7a2a'},
  '嵌入式系统':  {c:'#c8a96e', bg:'#faf5ec', chip:'#f0e0c0', chipTxt:'#7a5a20'},
};
function subjColor(name){
  return SUBJ_COLORS[name] || {c:'#9090b8',bg:'#f0f0f8',chip:'#dcdcf0',chipTxt:'#505080'};
}

// ━━━ IndexedDB ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('mcards-v3',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('cards')){
        const cs=d.createObjectStore('cards',{keyPath:'id'});
        cs.createIndex('subject','subject',{unique:false});
        cs.createIndex('created','created',{unique:false});
      }
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e.target.error);
  });
}
const tx=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbAll=s=>new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});
const dbPut=(s,d)=>new Promise((r,j)=>{const q=tx(s,'readwrite').put(d);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});
const dbGet=(s,k)=>new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});
const dbIdx=(s,i,v)=>new Promise((r,j)=>{const q=tx(s).index(i).getAll(v);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});

// ━━━ Remote Sync ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const REMOTE_FILES={
  '信号与系统':  '/data/signals.json',
  '复变函数':    '/data/complex.json',
  '电磁波与电磁场':'/data/em.json',
  '嵌入式系统':  '/data/embedded.json',
};

async function syncRemoteCards(){
  showSync('同步题目…');
  let added=0;
  const existing=await dbAll('cards');
  const existingIds=new Set(existing.map(c=>c.id));

  for(const [,path] of Object.entries(REMOTE_FILES)){
    try{
      const res=await fetch(path+'?t='+Date.now());
      if(!res.ok) continue;
      const cards=await res.json();
      if(!Array.isArray(cards)) continue;
      for(const card of cards){
        if(!existingIds.has(card.id)){
          await dbPut('cards',{...card,syncedAt:Date.now()});
          existingIds.add(card.id);
          added++;
        }
      }
    }catch(e){console.warn('sync failed',path,e)}
  }
  hideSync();
  if(added>0) toast(`已同步 ${added} 道新题目`);
}

function showSync(msg){
  document.getElementById('sync-bar').classList.add('show');
  document.getElementById('sync-msg').textContent=msg;
}
function hideSync(){document.getElementById('sync-bar').classList.remove('show')}

// ━━━ State ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const S={curSubj:null,curCard:null,stack:['v-dash'],allCards:[]};

// ━━━ Navigation ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function nav(id){
  document.querySelector('.view.active')?.classList.remove('active');
  document.getElementById(id).classList.add('active');
  S.stack.push(id);
}
function back(){
  if(S.stack.length<=1) return;
  document.querySelector('.view.active')?.classList.remove('active');
  S.stack.pop();
  const prev=S.stack[S.stack.length-1];
  document.getElementById(prev).classList.add('active');
  if(prev==='v-dash') renderDash();
  if(prev==='v-subj') renderSubj(S.curSubj);
}

// ━━━ Dashboard ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function renderDash(){
  const all=await dbAll('cards');
  S.allCards=all;
  const subjSet=[...new Set(all.map(c=>c.subject))];
  const weekAgo=Date.now()-7*86400000;
  const weekNew=all.filter(c=>new Date(c.created).getTime()>weekAgo||c.syncedAt>weekAgo).length;

  document.getElementById('stat-total').textContent=all.length;
  document.getElementById('stat-subj').textContent=subjSet.length;
  document.getElementById('stat-week').textContent=weekNew;
  document.getElementById('hero-sub').textContent=
    all.length ? `${subjSet.length} 个科目 · ${all.length} 道题目` : '暂无题目，等待同步…';

  // Subject grid
  const grid=document.getElementById('subj-grid');
  grid.innerHTML='';
  if(subjSet.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--txt2);font-size:13px">暂无科目</div>';
  } else {
    subjSet.forEach(name=>{
      const count=all.filter(c=>c.subject===name).length;
      const col=subjColor(name);
      const el=document.createElement('div');
      el.className='subj-card';
      el.style.setProperty('--c',col.c);
      el.innerHTML=`
        <div class="subj-card-accent"></div>
        <div class="subj-card-name">${name}</div>
        <div>
          <div class="subj-card-count">${count}</div>
          <div class="subj-card-lbl">道题目</div>
        </div>`;
      el.onclick=()=>openSubj(name);
      grid.appendChild(el);
    });
  }

  // Recent
  const recent=document.getElementById('recent-list');
  const rl=document.getElementById('recent-label');
  const sorted=[...all].sort((a,b)=>(b.syncedAt||0)-(a.syncedAt||0)).slice(0,5);
  if(sorted.length===0){rl.style.display='none';recent.innerHTML='';return}
  rl.style.display='';
  recent.innerHTML='';
  sorted.forEach(c=>recent.appendChild(mkCI(c)));
  doMath(recent);
}

// ━━━ Subject view ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function openSubj(name){
  S.curSubj=name;
  document.getElementById('subj-title').textContent=name;
  document.getElementById('search-inp').value='';
  await renderSubj(name);
  nav('v-subj');
}
async function renderSubj(name){
  const cards=await dbIdx('cards','subject',name);
  const list=document.getElementById('subj-list');
  list.innerHTML='';
  if(cards.length===0){
    list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">暂无题目</div></div>';
    return;
  }
  const sorted=[...cards].sort((a,b)=>b.created?.localeCompare(a.created||'')||0);
  sorted.forEach(c=>{list.appendChild(mkCI(c))});
  doMath(list);
}
function filterCards(){
  const q=document.getElementById('search-inp').value.trim().toLowerCase();
  const list=document.getElementById('subj-list');
  list.querySelectorAll('.ci').forEach(el=>{
    const text=(el.dataset.search||'').toLowerCase();
    el.style.display=(!q||text.includes(q))?'':'none';
  });
}

// ━━━ Card list item ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function mkCI(card){
  const col=subjColor(card.subject);
  const el=document.createElement('div');
  el.className='ci';
  el.style.setProperty('--c',col.c);
  el.dataset.search=[card.title,card.question,...(card.tags||[])].join(' ');
  const tags=(card.tags||[]).slice(0,3).map(t=>`<span class="ci-tag">${t}</span>`).join('');
  el.innerHTML=`
    <div class="ci-accent"></div>
    <div class="ci-title">${card.title||'无标题'}</div>
    <div class="ci-question">${stripMath(card.question||'')}</div>
    <div class="ci-meta">${tags}<span class="ci-date">${card.created||''}</span></div>`;
  el.onclick=()=>openCard(card);
  return el;
}
function stripMath(s){return s.replace(/\$\$[\s\S]*?\$\$/g,'[式]').replace(/\$[^$]*?\$/g,'[式]')}

// ━━━ Card detail ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openCard(card){
  S.curCard=card;
  const col=subjColor(card.subject);
  document.getElementById('cd-subj-label').textContent=card.subject;

  const wrap=document.getElementById('card-wrap');
  wrap.scrollTop=0;

  const tags=(card.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('');

  // Build steps HTML
  let stepsHtml='';
  const steps=card.steps||[];

  // Group: key step followed by its detail steps
  let i=0;
  while(i<steps.length){
    const s=steps[i];
    if(s.key){
      // collect following non-key steps as details
      let details=[];
      let j=i+1;
      while(j<steps.length && !steps[j].key){
        details.push(steps[j]);
        j++;
      }
      if(details.length>0){
        const detailContent=details.map(d=>`<div style="margin-bottom:8px">${d.content}</div>`).join('');
        stepsHtml+=`
          <div class="step">
            <div class="step-key">
              <div class="step-key-dot" style="background:${col.c}"></div>
              <div class="step-key-content">${s.content}</div>
            </div>
            <button class="step-detail-toggle" onclick="toggleDetail(this)">
              <span style="font-size:10px">▸</span> 查看推导细节
            </button>
            <div class="step-detail-content">${detailContent}</div>
          </div>`;
      } else {
        stepsHtml+=`
          <div class="step">
            <div class="step-key">
              <div class="step-key-dot" style="background:${col.c}"></div>
              <div class="step-key-content">${s.content}</div>
            </div>
          </div>`;
      }
      i=j;
    } else {
      stepsHtml+=`
        <div class="step">
          <div class="step-key">
            <div class="step-key-dot" style="background:${col.c};opacity:.4"></div>
            <div class="step-key-content" style="font-weight:400">${s.content}</div>
          </div>
        </div>`;
      i++;
    }
  }

  const imgHtml=card.image?`
    <div class="card-image">
      <img src="/data/images/${card.image}" alt="原题图片">
    </div>`:'';

  const conclusionHtml=card.conclusion?`
    <div class="card-conclusion" style="border-color:${col.c}">
      <div class="card-conclusion-label" style="color:${col.c}">关键结论</div>
      ${card.conclusion}
    </div>`:'';

  wrap.innerHTML=`
    <div class="white-card" style="--cc:${col.c};--cc-bg:${col.bg}">
      <div class="card-subject-bar">
        <span class="card-subject-chip" style="background:${col.chip};color:${col.chipTxt}">${card.subject}</span>
        <span class="card-date">${card.created||''}</span>
      </div>
      ${tags?`<div class="card-tags">${tags}</div>`:''}
      <div class="card-question">${card.question||''}</div>
      ${imgHtml}
      <div class="card-steps">${stepsHtml}</div>
      ${conclusionHtml}
    </div>`;

  nav('v-card');
  doMath(wrap);
}

function toggleDetail(btn){
  const content=btn.nextElementSibling;
  const open=content.classList.toggle('open');
  btn.querySelector('span').textContent=open?'▾':'▸';
  btn.childNodes[1].textContent=open?' 收起细节':' 查看推导细节';
  if(open) doMath(content);
}

// ━━━ KaTeX ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function doMath(el){
  function attempt(){
    if(window.renderMathInElement){
      renderMathInElement(el,{
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'$',right:'$',display:false},
          {left:'\\(',right:'\\)',display:false},
          {left:'\\[',right:'\\]',display:true},
        ],
        throwOnError:false,
      });
    } else {
      setTimeout(attempt,100);
    }
  }
  attempt();
}

// ━━━ Toast ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ━━━ Init ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function init(){
  await openDB();
  await syncRemoteCards();
  await renderDash();
  if('serviceWorker' in navigator)
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
window.addEventListener('DOMContentLoaded',init);
</script>
