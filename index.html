<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>错题本</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  crossorigin="anonymous" onload="window._katexReady=true"></script>

<style>
/* ━━━ Reset ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a; --surf:#1a1a2e; --surf2:#222238; --surf3:#2a2a45;
  --bdr:#2e2e50; --bdr2:#3a3a60;
  --txt:#e8e8f4; --txt2:#9090b8; --txt3:#55556a;
  --accent:#e8829a;
  --r:14px; --rs:8px; --rx:20px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent}

/* ━━━ Layout ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.view{display:none;flex-direction:column;flex:1;overflow:hidden}
.view.active{display:flex}

/* ━━━ Topbar ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tb{
  padding:calc(var(--st) + 12px) 14px 12px;
  display:flex;align-items:center;gap:8px;
  background:var(--surf);border-bottom:1px solid var(--bdr);
  flex-shrink:0;
}
.tb-title{font-size:17px;font-weight:700;flex:1;letter-spacing:.01em}
.tb-btn{
  width:36px;height:36px;border:none;background:var(--surf2);
  color:var(--txt);border-radius:var(--rs);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s;flex-shrink:0;
}
.tb-btn:active{background:var(--bdr)}

/* ━━━ Scroll ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px;padding-bottom:calc(var(--sb)+80px)}

/* ━━━ Dashboard ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.dash-hero{
  background:linear-gradient(135deg,#1e1e3a,#2a1a2e);
  border:1px solid var(--bdr);border-radius:var(--r);
  padding:20px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.dash-hero::after{
  content:'';position:absolute;right:-20px;top:-20px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,130,154,.15),transparent 70%);
}
.dash-hero-title{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,#e8829a,#b89ae8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:4px;
}
.dash-hero-sub{color:var(--txt2);font-size:13px}
.dash-stats{display:flex;gap:16px;margin-top:14px}
.dash-stat{flex:1;text-align:center}
.dash-stat-n{font-size:22px;font-weight:800;color:var(--accent)}
.dash-stat-l{font-size:11px;color:var(--txt2);margin-top:2px}

.sec-title{font-size:11px;font-weight:700;color:var(--txt2);
  text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px}

/* Subject grid */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.subj-card{
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);
  padding:14px;cursor:pointer;transition:transform .12s,border-color .12s;
  position:relative;overflow:hidden;min-height:100px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.subj-card:active{transform:scale(.97)}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:var(--accent)}
.subj-card-name{font-size:13px;font-weight:700;line-height:1.3}
.subj-card-n{font-size:26px;font-weight:800;color:var(--accent);margin-top:6px}
.subj-card-lbl{font-size:10px;color:var(--txt2)}
.add-subj{border:2px dashed var(--bdr);background:transparent;
  align-items:center;justify-content:center;gap:4px;
  color:var(--txt2);font-size:12px;min-height:100px}
.add-subj-icon{font-size:22px}

/* ━━━ Card list ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card-list{display:flex;flex-direction:column;gap:8px}
.ci{
  background:var(--surf);border:1px solid var(--bdr);
  border-left:3px solid var(--accent);
  border-radius:var(--rs);padding:12px 14px;cursor:pointer;
  transition:background .12s;
  animation:slideUp .18s ease both;
}
.ci:active{background:var(--surf2)}
.ci-q{font-size:14px;line-height:1.5;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{background:var(--surf2);color:var(--txt2);border-radius:100px;
  padding:2px 8px;font-size:11px;white-space:nowrap}
.ebadge{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700}
.date-t{font-size:11px;color:var(--txt3);margin-left:auto}
.diff-dots{display:flex;gap:2px;align-items:center}
.dd{width:6px;height:6px;border-radius:50%;background:var(--bdr)}
.dd.on{background:var(--accent)}

/* ━━━ Subject view ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.search-wrap{padding:10px 14px;background:var(--surf);
  border-bottom:1px solid var(--bdr);flex-shrink:0}
.search-inp{
  width:100%;padding:9px 14px;background:var(--surf2);
  border:1px solid var(--bdr);border-radius:100px;
  color:var(--txt);font-size:14px;font-family:inherit;outline:none;
}
.search-inp::placeholder{color:var(--txt2)}
.chips{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;
  flex-shrink:0;scrollbar-width:none;background:var(--surf);
  border-bottom:1px solid var(--bdr)}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:100px;border:1px solid var(--bdr);
  background:transparent;color:var(--txt2);font-size:11px;font-weight:600;
  white-space:nowrap;cursor:pointer;font-family:inherit;transition:all .12s;flex-shrink:0}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ━━━ Card detail ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cd-header{
  background:var(--surf);border-bottom:1px solid var(--bdr);
  padding:0 14px 14px;flex-shrink:0;
}
.cd-topbar{
  padding:calc(var(--st)+12px) 0 10px;
  display:flex;align-items:center;gap:8px;
}
.cd-meta{font-size:12px;color:var(--txt2);display:flex;
  align-items:center;gap:6px;margin-bottom:8px}
.cd-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.cd-q{font-size:16px;font-weight:700;line-height:1.6}

/* Section tabs — horizontal scroll */
.sec-tabs{
  display:flex;gap:6px;padding:10px 14px;overflow-x:auto;
  flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--bdr);
  scrollbar-width:none;
}
.sec-tabs::-webkit-scrollbar{display:none}
.stab{
  padding:7px 14px;border:1px solid var(--bdr);border-radius:100px;
  background:transparent;color:var(--txt2);font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .12s;flex-shrink:0;
}
.stab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Swipeable content area */
.sec-wrap{
  flex:1;overflow:hidden;position:relative;
}
.sec-panels{
  display:flex;height:100%;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sec-panel{
  min-width:100%;height:100%;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px 14px;
  padding-bottom:calc(var(--sb)+16px);
}
.slabel{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--accent);margin-bottom:10px}
.sbody{font-size:14.5px;line-height:1.8}
.sbody .katex-display{overflow-x:auto;padding:6px 0}

/* Steps */
.steps{list-style:none;display:flex;flex-direction:column;gap:12px}
.steps li{display:flex;gap:10px;align-items:flex-start}
.snum{width:22px;height:22px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px}
.stxt{font-size:14px;line-height:1.75;flex:1}
.stxt .katex-display{overflow-x:auto}

/* Error badge large */
.etype-badge{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:6px;padding:6px 14px;
  font-size:13px;font-weight:700;margin-bottom:12px;
}

/* Tip box */
.tip-box{
  background:var(--surf2);
  border-left:4px solid var(--accent);
  border-radius:0 var(--rs) var(--rs) 0;
  padding:14px 14px;font-size:14px;line-height:1.8;
}

/* Photo */
.photo-img{width:100%;border-radius:var(--rs);border:1px solid var(--bdr);
  margin-top:14px;object-fit:contain;max-height:280px;background:var(--surf2)}

/* Footer */
.cd-footer{
  padding:10px 14px;border-top:1px solid var(--bdr);background:var(--surf);
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;
  padding-bottom:calc(var(--sb)+10px);
}
.footer-lbl{font-size:11px;color:var(--txt2)}

/* ━━━ Import ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.drop-area{
  border:2px dashed var(--bdr);border-radius:var(--r);
  padding:36px 20px;text-align:center;color:var(--txt2);cursor:pointer;
  margin-bottom:14px;transition:border-color .15s,background .15s;
}
.drop-area:active,.drop-area.over{border-color:var(--accent);background:rgba(232,130,154,.06)}
.drop-icon{font-size:44px;margin-bottom:10px}
.drop-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:4px}
.drop-sub{font-size:13px}

.preview-box{background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--rs);padding:14px;font-size:13px;color:var(--txt2);
  margin-bottom:14px;line-height:1.7;display:none}
.preview-box strong{color:var(--txt)}

.btn{width:100%;padding:13px;border:none;border-radius:var(--rs);
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .12s}
.btn:active{opacity:.75}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);margin-top:8px}

.info-box{background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--rs);padding:14px;font-size:13px;color:var(--txt2);
  line-height:1.7;margin-top:20px}
.info-box strong{color:var(--txt)}

/* ━━━ Modal ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.moverlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;
}
.moverlay.open{display:flex}
.msheet{
  background:var(--surf);border-radius:var(--r) var(--r) 0 0;
  padding:20px 16px;padding-bottom:calc(var(--sb)+20px);
  width:100%;max-height:75vh;overflow-y:auto;
}
.msheet-title{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center}
.mopt{
  padding:13px 14px;border:1px solid var(--bdr);border-radius:var(--rs);
  margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:10px;transition:background .12s;
}
.mopt:active{background:var(--surf2)}
.mdot{width:10px;height:10px;border-radius:50%}
.minput{
  width:100%;padding:11px 14px;background:var(--surf2);
  border:1px solid var(--bdr);border-radius:var(--rs);
  color:var(--txt);font-size:14px;font-family:inherit;
  margin-bottom:10px;outline:none;
}
.minput:focus{border-color:var(--accent)}

/* ━━━ Empty state ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.empty{text-align:center;padding:48px 20px;color:var(--txt2)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:6px}

/* ━━━ Animations ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app">

<!-- ══ DASHBOARD ══════════════════════════════════════════════════ -->
<div class="view active" id="v-dash">
  <div class="tb">
    <div class="tb-title">错题本</div>
    <button class="tb-btn" onclick="nav('v-import')" title="导入">＋</button>
  </div>
  <div class="scroll">
    <div class="dash-hero">
      <div class="dash-hero-title">我的错题本</div>
      <div class="dash-hero-sub" id="hero-sub">加载中…</div>
      <div class="dash-stats">
        <div class="dash-stat"><div class="dash-stat-n" id="stat-total">0</div><div class="dash-stat-l">道错题</div></div>
        <div class="dash-stat"><div class="dash-stat-n" id="stat-subj">0</div><div class="dash-stat-l">个科目</div></div>
        <div class="dash-stat"><div class="dash-stat-n" id="stat-week">0</div><div class="dash-stat-l">本周新增</div></div>
      </div>
    </div>
    <div class="sec-title">科目</div>
    <div class="subj-grid" id="subj-grid"></div>
    <div class="sec-title">最近添加</div>
    <div class="card-list" id="recent-list"></div>
  </div>
</div>

<!-- ══ SUBJECT ════════════════════════════════════════════════════ -->
<div class="view" id="v-subj">
  <div class="tb">
    <button class="tb-btn" onclick="back()" style="font-size:22px">‹</button>
    <div class="tb-title" id="subj-title"></div>
    <button class="tb-btn" onclick="importForSubject()" title="导入">＋</button>
  </div>
  <div class="search-wrap">
    <input class="search-inp" placeholder="搜索…" id="search-inp" oninput="filterCards()">
  </div>
  <div class="chips" id="chips"></div>
  <div class="scroll" style="padding-top:10px">
    <div class="card-list" id="subj-list"></div>
  </div>
</div>

<!-- ══ CARD DETAIL ════════════════════════════════════════════════ -->
<div class="view" id="v-card">
  <div class="cd-header">
    <div class="cd-topbar">
      <button class="tb-btn" onclick="back()" style="font-size:22px">‹</button>
      <div class="tb-title" id="cd-subj-name" style="font-size:14px;font-weight:600;color:var(--txt2)"></div>
      <button class="tb-btn" onclick="delCard()" style="font-size:16px">🗑</button>
    </div>
    <div class="cd-meta">
      <div class="cd-dot"></div>
      <span id="cd-meta"></span>
    </div>
    <div class="cd-q" id="cd-q"></div>
  </div>
  <div class="sec-tabs" id="sec-tabs">
    <button class="stab active" onclick="goSec(0,this)">A 我的错误</button>
    <button class="stab"        onclick="goSec(1,this)">B 正确解法</button>
    <button class="stab"        onclick="goSec(2,this)">C 错因分析</button>
    <button class="stab"        onclick="goSec(3,this)">D 易错点</button>
  </div>
  <div class="sec-wrap" id="sec-wrap">
    <div class="sec-panels" id="sec-panels">
      <div class="sec-panel" id="sp0"></div>
      <div class="sec-panel" id="sp1"></div>
      <div class="sec-panel" id="sp2"></div>
      <div class="sec-panel" id="sp3"></div>
    </div>
  </div>
  <div class="cd-footer" id="cd-footer"></div>
</div>

<!-- ══ IMPORT ════════════════════════════════════════════════════ -->
<div class="view" id="v-import">
  <div class="tb">
    <button class="tb-btn" onclick="back()" style="font-size:22px">‹</button>
    <div class="tb-title">导入错题卡</div>
  </div>
  <div class="scroll">
    <div class="drop-area" id="drop-area" onclick="$('json-inp').click()">
      <div class="drop-icon">📋</div>
      <div class="drop-title">选择 card.json 文件</div>
      <div class="drop-sub">或将文件拖放到此处</div>
    </div>
    <input type="file" id="json-inp" accept=".json" style="display:none" onchange="loadJson(event)">
    <input type="file" id="photo-inp" accept="image/*" style="display:none" onchange="loadPhoto(event)">

    <div class="preview-box" id="preview-box"></div>

    <div id="photo-sec" style="display:none;margin-bottom:14px">
      <div class="sec-title" style="margin-bottom:8px">附原题图片（可选）</div>
      <div class="drop-area" style="padding:20px" onclick="$('photo-inp').click()">
        📷 点击附上原题照片
      </div>
      <img id="photo-prev" style="display:none;width:100%;border-radius:8px;margin-top:8px;border:1px solid var(--bdr)">
    </div>

    <div id="import-actions" style="display:none">
      <button class="btn btn-p" onclick="doImport()">✓ 导入此错题卡</button>
      <button class="btn btn-s" onclick="resetImport()">重新选择</button>
    </div>

    <div class="info-box">
      <strong>如何使用</strong><br><br>
      1. 在电脑上用 <code>gen_card.py</code> 生成错题卡，会同时产出 card.json<br>
      2. 通过微信传到手机，在文件管理器里找到<br>
      3. 回到此页面点击上方区域选择文件即可<br><br>
      💡 导入后数据永久保存在手机本地，离线也可浏览
    </div>
  </div>
</div>

</div><!-- #app -->

<!-- ══ Subject modal ══════════════════════════════════════════════ -->
<div class="moverlay" id="subj-modal">
  <div class="msheet">
    <div class="msheet-title">选择科目</div>
    <div id="msubj-opts"></div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)">
      <div style="font-size:13px;color:var(--txt2);margin-bottom:8px">新建科目</div>
      <input class="minput" id="new-subj-inp" placeholder="科目名称">
      <button class="btn btn-p" onclick="createSubj()">创建并导入</button>
    </div>
    <button class="btn btn-s" onclick="closeModal()" style="margin-top:8px">取消</button>
  </div>
</div>

<script>
// ━━━ Palette ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const COLORS = ['#e8829a','#7ab8e8','#a8d8a0','#e8c07a','#b89ae8',
                '#e8d07a','#7ae8d0','#e87ab8','#9ae87a','#7a9ae8'];
const ERR_C  = {
  '概念错误':'#e05050','方法错误':'#9060e0',
  '计算失误':'#4080e0','审题疏忽':'#40a060','知识盲区':'#e0a040',
};

// ━━━ IndexedDB ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('mistake-cards',2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('cards')){
        const cs=d.createObjectStore('cards',{keyPath:'id',autoIncrement:true});
        cs.createIndex('subject','subject',{unique:false});
        cs.createIndex('importedAt','importedAt',{unique:false});
      }
      if(!d.objectStoreNames.contains('subjects'))
        d.createObjectStore('subjects',{keyPath:'name'});
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e.target.error);
  });
}
const tx=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
function dbAll(s){return new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
function dbIdx(s,i,v){return new Promise((r,j)=>{const q=tx(s).index(i).getAll(v);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
function dbPut(s,d){return new Promise((r,j)=>{const q=tx(s,'readwrite').put(d);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
function dbDel(s,k){return new Promise((r,j)=>{const q=tx(s,'readwrite').delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})}

// ━━━ State ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const S={
  subjects:[], cards:[], curSubj:null, curCard:null,
  curSec:0, filter:'all', stack:['v-dash'],
  pendingJson:null, pendingPhoto:null, pendingSubj:null,
};

// ━━━ Utils ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const $=id=>document.getElementById(id);
function setAccent(c){document.documentElement.style.setProperty('--accent',c||'#e8829a')}
function subjColor(name){
  const s=S.subjects.find(x=>x.name===name);
  return s?.color||'#888';
}

// ━━━ Navigation ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function nav(id,push=true){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $(id).classList.add('active');
  if(push && S.stack.at(-1)!==id) S.stack.push(id);
}
function back(){
  if(S.stack.length>1){
    S.stack.pop();
    const p=S.stack.at(-1);
    nav(p,false);
    if(p==='v-dash') renderDash();
    if(p==='v-subj') renderSubj(S.curSubj);
  }
}

// ━━━ Math rendering ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function doMath(el){
  function attempt(){
    if(typeof renderMathInElement==='function'){
      renderMathInElement(el,{
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'$',right:'$',display:false},
          {left:'\\(',right:'\\)',display:false},
          {left:'\\[',right:'\\]',display:true},
        ],
        throwOnError:false,
      });
    }
  }
  if(window._katexReady) attempt();
  else document.addEventListener('katex-ready',attempt,{once:true});
}
// Fire event when auto-render loads
const _origOnload=document.querySelector('script[onload]');
window.addEventListener('load',()=>{
  if(typeof renderMathInElement==='function'){
    window._katexReady=true;
    document.dispatchEvent(new Event('katex-ready'));
  }
});

// ━━━ Dashboard ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function renderDash(){
  S.subjects=await dbAll('subjects');
  const all=await dbAll('cards');
  setAccent('#e8829a');

  // Stats
  const weekAgo=Date.now()-7*86400000;
  const weekNew=all.filter(c=>c.importedAt>weekAgo).length;
  $('stat-total').textContent=all.length;
  $('stat-subj').textContent=S.subjects.length;
  $('stat-week').textContent=weekNew;
  $('hero-sub').textContent=`共 ${all.length} 道错题，${S.subjects.length} 个科目`;

  // Subject grid
  const grid=$('subj-grid');
  grid.innerHTML='';
  S.subjects.forEach(sub=>{
    const cnt=all.filter(c=>c.subject===sub.name).length;
    const d=document.createElement('div');
    d.className='subj-card';
    d.style.setProperty('--accent',sub.color);
    d.innerHTML=`<div class="subj-card-name">${sub.name}</div>
      <div><div class="subj-card-n">${cnt}</div>
      <div class="subj-card-lbl">道错题</div></div>`;
    d.onclick=()=>openSubj(sub.name);
    grid.appendChild(d);
  });
  const addBtn=document.createElement('div');
  addBtn.className='subj-card add-subj';
  addBtn.innerHTML='<div class="add-subj-icon">＋</div><div>新建科目</div>';
  addBtn.onclick=()=>{S.pendingJson=null;openSubjModal(null)};
  grid.appendChild(addBtn);

  // Recent 5
  const recent=[...all].sort((a,b)=>(b.importedAt||0)-(a.importedAt||0)).slice(0,5);
  const list=$('recent-list');
  list.innerHTML='';
  if(!recent.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">还没有错题</div><div>点右上角 ＋ 导入第一张</div></div>';
    return;
  }
  recent.forEach(c=>list.appendChild(mkCI(c)));
  doMath(list);
}

// ━━━ Card item ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function mkCI(card){
  const color=subjColor(card.subject);
  const ec=ERR_C[card.error_reason_type]||'#888';
  const tags=(card.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
  const dots=Array.from({length:5},(_,i)=>
    `<div class="dd ${i<(card.difficulty?.length||0)?'on':''}"></div>`).join('');
  const el=document.createElement('div');
  el.className='ci';
  el.style.setProperty('--accent',color);
  el.innerHTML=`
    <div class="ci-q">${card.question||''}</div>
    <div class="ci-meta">
      ${card.error_reason_type?`<span class="ebadge" style="background:${ec}22;color:${ec}">${card.error_reason_type}</span>`:''}
      ${tags}
      <div class="diff-dots">${dots}</div>
      <span class="date-t">${card.date||''}</span>
    </div>`;
  el.onclick=()=>openCard(card);
  return el;
}

// ━━━ Subject view ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function openSubj(name){
  S.curSubj=name;
  await renderSubj(name);
  nav('v-subj');
}
async function renderSubj(name){
  const sub=S.subjects.find(s=>s.name===name);
  setAccent(sub?.color||'#e8829a');
  $('subj-title').textContent=name;
  S.cards=await dbIdx('cards','subject',name);
  S.cards.sort((a,b)=>(b.importedAt||0)-(a.importedAt||0));

  // Chips
  const allTags=[...new Set(S.cards.flatMap(c=>c.tags||[]))];
  const chips=$('chips');
  chips.innerHTML=`<button class="chip active" data-f="all" onclick="setF('all',this)">全部 ${S.cards.length}</button>`;
  allTags.forEach(t=>{
    const cnt=S.cards.filter(c=>(c.tags||[]).includes(t)).length;
    const b=document.createElement('button');
    b.className='chip';b.dataset.f=t;
    b.textContent=`${t} ${cnt}`;
    b.onclick=function(){setF(t,this)};
    chips.appendChild(b);
  });
  renderList(S.cards);
}
function renderList(cards){
  const list=$('subj-list');
  list.innerHTML='';
  if(!cards.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">✨</div><div class="empty-title">暂无错题</div><div>点右上角 ＋ 添加</div></div>';
    return;
  }
  cards.forEach((c,i)=>{
    const el=mkCI(c);
    el.style.animationDelay=`${i*.04}s`;
    list.appendChild(el);
  });
  doMath(list);
}
function setF(val,btn){
  S.filter=val;
  document.querySelectorAll('.chips .chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}
function filterCards(){
  const q=$('search-inp').value.toLowerCase();
  let cards=S.cards;
  if(S.filter!=='all') cards=cards.filter(c=>(c.tags||[]).includes(S.filter));
  if(q) cards=cards.filter(c=>
    (c.question||'').toLowerCase().includes(q)||
    (c.tags||[]).some(t=>t.toLowerCase().includes(q))||
    (c.error_reason_detail||'').toLowerCase().includes(q));
  renderList(cards);
}
function importForSubject(){S.pendingSubj=S.curSubj;nav('v-import')}

// ━━━ Card detail ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openCard(card){
  S.curCard=card;S.curSec=0;
  const color=subjColor(card.subject);
  setAccent(color);
  $('cd-subj-name').textContent=card.subject||'';
  const diff=(card.difficulty||'').replace(/⭐/g,'★');
  $('cd-meta').textContent=[diff,card.date].filter(Boolean).join('  ');

  const qEl=$('cd-q');
  qEl.textContent=card.question||'';
  doMath(qEl);

  // Render all 4 panels upfront
  renderAllPanels();

  // Reset tabs
  document.querySelectorAll('.stab').forEach((t,i)=>t.classList.toggle('active',i===0));
  $('sec-panels').style.transform='translateX(0)';

  renderFooter();
  setupSwipe();
  nav('v-card');
}

function renderAllPanels(){
  const c=S.curCard;
  // Panel 0: My error
  $('sp0').innerHTML=`<div class="slabel">我的错误</div><div class="sbody">${c.my_answer||''}</div>${c.photo?`<img class="photo-img" src="${c.photo}">`:''}`;
  // Panel 1: Solution
  const sol=c.correct_solution;
  let solH='';
  if(Array.isArray(sol)){
    solH='<ol class="steps">'+sol.map((s,i)=>
      `<li><div class="snum">${i+1}</div><div class="stxt">${s}</div></li>`
    ).join('')+'</ol>';
  } else solH=`<div class="sbody">${sol||''}</div>`;
  $('sp1').innerHTML=`<div class="slabel">正确解法</div>${solH}`;
  // Panel 2: Error analysis
  const ec=ERR_C[c.error_reason_type]||'#888';
  $('sp2').innerHTML=`<div class="slabel">错因分析</div>
    <div class="etype-badge" style="background:${ec}22;color:${ec}">${c.error_reason_type||''}</div>
    <div class="sbody">${c.error_reason_detail||''}</div>`;
  // Panel 3: Tip
  $('sp3').innerHTML=`<div class="slabel">易错点提醒</div><div class="tip-box">${c.tip||''}</div>`;

  // Render math in all panels
  ['sp0','sp1','sp2','sp3'].forEach(id=>doMath($(id)));
}

function goSec(idx,btn){
  S.curSec=idx;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $('sec-panels').style.transform=`translateX(${-idx*100}%)`;
}

function renderFooter(){
  const c=S.curCard;
  const tags=(c.tags||[]).map(t=>
    `<span class="tag" style="cursor:pointer" onclick="goTagFilter('${t}')">${t}</span>`
  ).join('');
  $('cd-footer').innerHTML=`<span class="footer-lbl">标签</span>${tags||'<span style="color:var(--txt2);font-size:12px">无标签</span>'}`;
}

function goTagFilter(tag){
  back();
  setTimeout(()=>{
    const chip=[...$('chips').querySelectorAll('.chip')].find(c=>c.dataset.f===tag);
    if(chip) setF(tag,chip);
  },150);
}

async function delCard(){
  if(!confirm('删除这道错题？')) return;
  await dbDel('cards',S.curCard.id);
  back();
}

// ━━━ Swipe gesture ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setupSwipe(){
  const wrap=$('sec-wrap');
  let startX=0,startY=0,dragging=false,isHoriz=null;
  wrap.ontouchstart=e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    dragging=true;isHoriz=null;
  };
  wrap.ontouchmove=e=>{
    if(!dragging) return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(isHoriz===null) isHoriz=Math.abs(dx)>Math.abs(dy);
    if(isHoriz) e.preventDefault();
  };
  wrap.ontouchend=e=>{
    if(!dragging||!isHoriz) return;
    dragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)<50) return;
    const tabs=document.querySelectorAll('.stab');
    if(dx<0 && S.curSec<3) goSec(S.curSec+1,tabs[S.curSec+1]);
    if(dx>0 && S.curSec>0) goSec(S.curSec-1,tabs[S.curSec-1]);
  };
}

// ━━━ Import ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadJson(e){
  const f=e.target.files[0];if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      S.pendingJson=JSON.parse(ev.target.result);
      showPreview(S.pendingJson);
    }catch(err){alert('JSON 格式错误：'+err.message)}
  };
  r.readAsText(f);
}
function showPreview(d){
  const p=$('preview-box');
  p.style.display='block';
  p.innerHTML=`<strong>${d.subject||'未知科目'}</strong> — ${d.date||''}<br>
    ${(d.question||'').slice(0,80)}…<br>
    <span style="color:var(--txt2)">错因：${d.error_reason_type||''} · 标签：${(d.tags||[]).join('、')||'无'}</span>`;
  $('photo-sec').style.display='block';
  $('import-actions').style.display='block';
}
function loadPhoto(e){
  const f=e.target.files[0];if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    S.pendingPhoto=ev.target.result;
    $('photo-prev').src=ev.target.result;
    $('photo-prev').style.display='block';
  };
  r.readAsDataURL(f);
}
async function doImport(){
  if(!S.pendingJson) return;
  const data=S.pendingJson;
  const subjName=S.pendingSubj||data.subject;
  if(!subjName){openSubjModal(data);return}
  await ensureSubj(subjName);
  await dbPut('cards',{...data,subject:subjName,photo:S.pendingPhoto||null,importedAt:Date.now()});
  resetImport();
  S.pendingSubj=null;
  back();
  await renderDash();
  if(S.curSubj===subjName) await renderSubj(subjName);
  // Toast
  toast('✓ 导入成功');
}
function resetImport(){
  S.pendingJson=null;S.pendingPhoto=null;
  $('preview-box').style.display='none';
  $('photo-sec').style.display='none';
  $('import-actions').style.display='none';
  $('photo-prev').style.display='none';
  $('json-inp').value='';$('photo-inp').value='';
}

// ━━━ Subject modal ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openSubjModal(data){
  if(data) S.pendingJson=data;
  const opts=$('msubj-opts');opts.innerHTML='';
  S.subjects.forEach(sub=>{
    const el=document.createElement('div');
    el.className='mopt';
    el.innerHTML=`<div class="mdot" style="background:${sub.color}"></div>${sub.name}`;
    el.onclick=async()=>{closeModal();S.pendingSubj=sub.name;await doImport()};
    opts.appendChild(el);
  });
  $('subj-modal').classList.add('open');
  $('new-subj-inp').value='';
}
async function createSubj(){
  const name=$('new-subj-inp').value.trim();
  if(!name) return;
  closeModal();
  await ensureSubj(name);
  S.pendingSubj=name;
  await doImport();
}
function closeModal(){$('subj-modal').classList.remove('open')}
async function ensureSubj(name){
  if(S.subjects.find(s=>s.name===name)) return;
  const color=COLORS[S.subjects.length%COLORS.length];
  await dbPut('subjects',{name,color});
  S.subjects.push({name,color});
}

// ━━━ Toast ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toast(msg){
  const el=document.createElement('div');
  Object.assign(el.style,{
    position:'fixed',bottom:`calc(var(--sb) + 24px)`,left:'50%',
    transform:'translateX(-50%)',
    background:'rgba(30,30,50,.95)',color:'#fff',
    padding:'10px 20px',borderRadius:'100px',fontSize:'14px',
    fontWeight:'600',zIndex:'999',whiteSpace:'nowrap',
    border:'1px solid rgba(255,255,255,.1)',
    animation:'fadeIn .2s ease',
    boxShadow:'0 4px 20px rgba(0,0,0,.4)',
  });
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

// ━━━ Drag-drop ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setupDrop(){
  const area=$('drop-area');
  area.addEventListener('dragover',e=>{e.preventDefault();area.classList.add('over')});
  area.addEventListener('dragleave',()=>area.classList.remove('over'));
  area.addEventListener('drop',e=>{
    e.preventDefault();area.classList.remove('over');
    const f=e.dataTransfer.files[0];
    if(f?.name.endsWith('.json')){
      const r=new FileReader();
      r.onload=ev=>{try{S.pendingJson=JSON.parse(ev.target.result);showPreview(S.pendingJson)}catch{}};
      r.readAsText(f);
    }
  });
}

// ━━━ Demo data ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function insertDemo(){
  const all=await dbAll('cards');
  if(all.length) return;
  await ensureSubj('信号与系统');
  await ensureSubj('复变函数');
  await dbPut('cards',{

// ━━━ URL routing (subject shortcuts) ━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function handleRoute(){
  const p=new URLSearchParams(location.search).get('subject');
  if(p){
    const name=decodeURIComponent(p);
    if(S.subjects.find(s=>s.name===name)) await openSubj(name);
  }
}

// ━━━ Init ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function init(){
  await openDB();
  await insertDemo();
  S.subjects=await dbAll('subjects');
  await renderDash();
  setupDrop();
  await handleRoute();
  // SW
  if('serviceWorker' in navigator)
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
window.addEventListener('DOMContentLoaded',init);
</script>
