name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore
          ls -la $GITHUB_WORKSPACE/release.keystore

      - name: Build TWA project files
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/gradle/wrapper

          cp icon-512.png twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > twa/settings.gradle << 'GRADLE'
          rootProject.name = "MistakeCards"
          include ':app'
          GRADLE

          cat > twa/build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          GRADLE

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          cat > twa/gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

          cat > twa/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.orca.mistakecards'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.orca.mistakecards'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GRADLE

          cat > twa/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="错题本"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://mistake-cards.vercel.app" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="@color/colorPrimary" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                              android:host="mistake-cards.vercel.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > twa/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1a1a2e</color>
              <color name="backgroundColor">#0f0f1a</color>
          </resources>
          XML

          cd twa
          gradle wrapper --gradle-version=8.2
          chmod +x gradlew

      - name: Build APK
        run: |
          cd twa
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks $GITHUB_WORKSPACE/release.keystore \
            --ks-key-alias android \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out twa/mistakecards-signed.apk \
            twa/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify APK fingerprint
        run: |
          keytool -printcert -jarfile twa/mistakecards-signed.apk | grep "SHA256:"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mistakecards-apk
          path: twa/mistakecards-signed.apk
          if-no-files-found: error
