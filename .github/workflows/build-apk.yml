name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Orca, OU=AHU, O=AHU, L=Hefei, S=Anhui, C=CN"

      - name: Init TWA project
        run: |
          bubblewrap init \
            --manifest "https://mistake-cards-mq9yzbomq-mayrains-projects.vercel.app/manifest.json" \
            --directory ./twa \
            <<< $'android123\nandroid123\ncom.orca.mistakecards\n错题本\n错题本\n1\n1.0.0\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n'
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

      - name: Build with Bubblewrap
        run: |
          cd twa
          bubblewrap build \
            --skipPwaValidation \
            <<< $'android123\nandroid123\n'
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mistakecards-apk
          path: |
            twa/*.apk
            twa/*.aab
          if-no-files-found: error
