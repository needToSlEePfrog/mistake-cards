name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore (for signing)
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Orca, OU=Student, O=AHU, L=Hefei, S=Anhui, C=CN"

      - name: Init Bubblewrap project
        run: |
          bubblewrap init \
            --manifest=https://mistake-cards-mq9yzbomq-mayrains-projects.vercel.app/manifest.json \
            --directory=./twa-project \
            --packageId=com.orca.mistakecards \
            --name="错题本" \
            --themeColor=#1a1a2e \
            --backgroundColor=#0f0f1a \
            --startUrl=/ \
            --iconUrl=https://mistake-cards-mq9yzbomq-mayrains-projects.vercel.app/icon-512.png
        continue-on-error: true

      - name: Build APK with Gradle (alternative)
        run: |
          cd twa-project || true
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=../android.keystore \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=android \
              -Pandroid.injected.signing.key.password=android
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mistakecards-apk
          path: |
            twa-project/app/build/outputs/apk/**/*.apk
            twa-project/app/build/outputs/apk/**/*.aab
          if-no-files-found: warn
